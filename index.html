<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OH NO MELONS</title>
    <style>
        :root {
            --bg-color: #0b0b12;
            --neon-magenta: #ff00ff;
            --neon-cyan: #00ffff;
            --neon-lime: #39ff14;
            --neon-yellow: #ffff00;
            --neon-red: #ff003c;
            --text-glow: 0 0 5px currentColor, 0 0 10px currentColor;
            --box-glow: 0 0 10px currentColor, inset 0 0 10px currentColor;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            touch-action: manipulation;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            transition: background-color 0.3s;
        }

        #start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 11, 18, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .brand-small {
            font-size: 1rem;
            color: var(--neon-cyan);
            text-shadow: var(--text-glow);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .title-large {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.1;
            color: var(--neon-magenta);
            text-shadow: 0 0 10px var(--neon-magenta), 0 0 20px var(--neon-magenta), 0 0 40px var(--neon-magenta);
            animation: flicker 3s infinite alternate, bounce 2s infinite ease-in-out;
            margin-bottom: 40px;
        }

        .play-btn {
            background: transparent;
            color: var(--neon-lime);
            border: 2px solid var(--neon-lime);
            padding: 15px 40px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 10px;
            box-shadow: var(--box-glow);
            text-shadow: var(--text-glow);
            cursor: pointer;
            transition: all 0.1s;
        }

        .play-btn:active {
            transform: scale(0.9);
            box-shadow: 0 0 20px var(--neon-lime), inset 0 0 20px var(--neon-lime);
        }

        #game-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            position: relative;
        }

        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: var(--neon-cyan);
            text-shadow: var(--text-glow);
        }
        
        .score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            transition: color 0.3s, text-shadow 0.3s;
        }

        .new-best {
            color: var(--neon-yellow) !important;
            text-shadow: 0 0 10px var(--neon-yellow), 0 0 20px var(--neon-yellow) !important;
            animation: pulse-glow 0.5s infinite alternate;
        }

        .machine {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .casino-border {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #1a1a24;
            border: 4px solid var(--neon-magenta);
            border-radius: 15px;
            box-shadow: var(--box-glow);
            position: relative;
            overflow: hidden;
        }

        .casino-border::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, rgba(255,0,255,0.3), transparent 30%);
            animation: rotate 4s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        .reels-container {
            display: flex;
            gap: 10px;
            z-index: 1;
            background: #000;
            padding: 10px;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .reel {
            width: 80px;
            height: 120px;
            background: #111;
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 4rem;
            position: relative;
            overflow: hidden;
        }

        .spinning {
            animation: blur-spin 0.1s infinite;
            color: transparent;
            text-shadow: 0 0 15px rgba(255,255,255,0.8);
        }

        .snap {
            animation: reel-snap 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5rem;
            color: var(--neon-lime);
            text-shadow: var(--text-glow);
        }

        .button-row {
            display: flex;
            gap: 10px;
            height: 80px;
        }

        .btn {
            background: #1a1a24;
            border-radius: 12px;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.1s;
        }

        #btn-bet {
            flex: 1;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 5px var(--neon-cyan), inset 0 0 5px var(--neon-cyan);
        }

        #btn-spin {
            flex: 2;
            border: 2px solid var(--neon-magenta);
            color: var(--neon-magenta);
            box-shadow: 0 0 10px var(--neon-magenta), inset 0 0 10px var(--neon-magenta);
            font-size: 2rem;
            text-transform: uppercase;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        #message-board {
            text-align: center;
            height: 30px;
            font-size: 1.2rem;
            color: var(--neon-yellow);
            text-shadow: var(--text-glow);
            font-weight: bold;
        }

        @keyframes blur-spin {
            0% { transform: translateY(-50%); opacity: 0.5; }
            100% { transform: translateY(50%); opacity: 0.5; }
        }

        @keyframes reel-snap {
            0% { transform: translateY(-20px); }
            50% { transform: translateY(10px); }
            100% { transform: translateY(0); }
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse-glow {
            from { opacity: 0.7; }
            to { opacity: 1; transform: scale(1.1); }
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.1; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="brand-small">FRUITSTANDPRODUCTIONS</div>
        <div class="title-large">OH NO<br>MELONS</div>
        <button class="play-btn" id="btn-play">PLAY</button>
    </div>

    <div id="game-container">
        <div class="header">
            <div class="score-box">
                <span>SESSION BEST</span>
                <span id="score-session" class="score-value">0</span>
            </div>
            <div class="brand-small" style="font-size:0.7rem; opacity:0.5; margin-top:10px;">OH NO MELONS</div>
            <div class="score-box">
                <span>PERSONAL BEST</span>
                <span id="score-personal" class="score-value">0</span>
            </div>
        </div>

        <div class="machine">
            <div class="casino-border" id="casino-border">
                <div class="reels-container">
                    <div class="reel" id="reel-0">🍎</div>
                    <div class="reel" id="reel-1">🍎</div>
                    <div class="reel" id="reel-2">🍎</div>
                </div>
            </div>
        </div>

        <div id="message-board">WELCOME</div>

        <div class="controls">
            <div class="hud-row">
                <div>CREDITS: <span id="credits-display">100</span></div>
            </div>
            <div class="button-row">
                <button id="btn-bet" class="btn">BET: 10</button>
                <button id="btn-spin" class="btn">SPIN</button>
            </div>
        </div>
    </div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playTone(freq, type, duration, vol=0.1) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const Sounds = {
        start: () => {
            playTone(440, 'square', 0.1); setTimeout(() => playTone(554, 'square', 0.1), 100); setTimeout(() => playTone(659, 'square', 0.3), 200);
        },
        spin: () => playTone(150, 'sawtooth', 0.1, 0.05),
        stop: () => playTone(800, 'sine', 0.05, 0.1),
        nearMiss: () => playTone(200, 'square', 0.5, 0.1),
        winSmall: () => { playTone(523.25, 'sine', 0.3); playTone(659.25, 'sine', 0.3); },
        winBig: () => {
            for(let i=0; i<10; i++) {
                setTimeout(() => playTone(400 + Math.random()*600, 'square', 0.1, 0.15), i*50);
            }
        }
    };

    const Symbols = {
        APPLE: { char: '🍎', val: 5 },
        BANANA: { char: '🍌', val: 10 },
        ORANGE: { char: '🍊', val: 15 },
        GRAPE: { char: '🍇', val: 20 },
        MELON: { char: '🍉', val: 50 },
        GLITCH: { char: '👾', val: 100, wild: true }
    };
    
    const symbolKeys = Object.keys(Symbols);
    const betLevels = [1, 10, 50];
    
    let state = {
        credits: 100,
        betIndex: 1,
        sessionBest: 0,
        personalBest: localStorage.getItem('onm_pb') || 0,
        isSpinning: false
    };

    const els = {
        startScreen: document.getElementById('start-screen'),
        btnPlay: document.getElementById('btn-play'),
        btnSpin: document.getElementById('btn-spin'),
        btnBet: document.getElementById('btn-bet'),
        credits: document.getElementById('credits-display'),
        sessionBest: document.getElementById('score-session'),
        personalBest: document.getElementById('score-personal'),
        msg: document.getElementById('message-board'),
        reels: [
            document.getElementById('reel-0'),
            document.getElementById('reel-1'),
            document.getElementById('reel-2')
        ]
    };

    function init() {
        els.personalBest.textContent = state.personalBest;
        updateUI();

        els.btnPlay.addEventListener('click', () => {
            audioCtx.resume();
            Sounds.start();
            els.startScreen.style.display = 'none';
        });

        els.btnBet.addEventListener('click', () => {
            if (state.isSpinning) return;
            state.betIndex = (state.betIndex + 1) % betLevels.length;
            updateUI();
        });

        els.btnSpin.addEventListener('click', startSpin);
    }

    function updateUI() {
        els.btnBet.textContent = `BET: ${betLevels[state.betIndex]}`;
        els.credits.textContent = state.credits;
        if (state.credits <= 0 && !state.isSpinning) {
            els.btnSpin.textContent = "RESET";
        } else {
            els.btnSpin.textContent = "SPIN";
        }
    }

    function getRandomSymbol() {
        return symbolKeys[Math.floor(Math.random() * symbolKeys.length)];
    }

    async function startSpin() {
        if (state.isSpinning) return;
        if (state.credits <= 0) {
            state.credits = 100;
            updateUI();
            return;
        }

        const currentBet = betLevels[state.betIndex];
        if (state.credits < currentBet) return;

        state.credits -= currentBet;
        state.isSpinning = true;
        updateUI();

        let results = [getRandomSymbol(), getRandomSymbol(), getRandomSymbol()];

        const spinIntervals = els.reels.map((reel, i) => {
            reel.classList.add('spinning');
            return setInterval(() => {
                reel.textContent = Symbols[symbolKeys[Math.floor(Math.random() * symbolKeys.length)]].char;
            }, 50);
        });

        for (let i = 0; i < 3; i++) {
            await new Promise(r => setTimeout(r, 600));
            clearInterval(spinIntervals[i]);
            els.reels[i].classList.remove('spinning');
            els.reels[i].textContent = Symbols[results[i]].char;
            els.reels[i].classList.add('snap');
            Sounds.stop();
        }

        evaluateWin(results, currentBet);
    }

    function evaluateWin(results, bet) {
        state.isSpinning = false;
        let win = false;
        if (results[0] === results[1] && results[1] === results[2]) win = true;

        if (win) {
            const amt = Symbols[results[0]].val * bet;
            state.credits += amt;
            els.msg.textContent = `WIN: +${amt}`;
            Sounds.winSmall();
            if (amt > state.sessionBest) {
                state.sessionBest = amt;
                els.sessionBest.textContent = amt;
            }
        } else {
            els.msg.textContent = "";
        }
        updateUI();
    }

    init();
</script>
</body>
</html>
